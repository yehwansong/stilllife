<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Touch to Play</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: black;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-image: url(IMG_9409_10.png);
    }
    video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transform: scale(1.2);
      filter: contrast(1.3);
      background: black;
      transform-origin: 67%;
    }
  </style>
</head>
<body>
  <video id="vid" src="IMG_9409.mp4" playsinline muted></video>
  <script>
    const video = document.getElementById("vid");

    video.addEventListener("loadedmetadata", () => {
      video.currentTime = 0;
      video.pause();
    });

    async function handleTouch() {
      video.pause();
      video.currentTime = 0;
      try {
        await video.play();
        console.log("▶️ Video restarted");
      } catch (err) {
        console.error("Playback failed:", err);
      }
    }

    video.addEventListener("ended", () => {
      video.pause();
      video.currentTime = 0;
      console.log("⏹️ Video ended, showing first frame");
    });

    window.addEventListener("touchstart", handleTouch, { passive: true });

    // Fake random touches every 0.1~5 seconds
    function scheduleFakeTouch() {
      const delay = Math.random() * (5000 - 100) + 100;
      setTimeout(() => {
        console.log(`👆 Fake touch at ${delay.toFixed(0)}ms`);
        handleTouch();
        scheduleFakeTouch();
      }, delay);
    }

    scheduleFakeTouch();
  </script>
</body>
</html>
