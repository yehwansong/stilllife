<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Touch to Play</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: black;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }
    video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      /*display: none;*/
      transform: scale(1.05);
      transform-origin: right;
      filter: contrast(1.3);
    }
  </style>
</head>
<body>
  <video id="vid" src="IMG_9409.mp4" playsinline muted loop autoplay></video>
