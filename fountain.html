<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Touch to Play</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: black;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-image: url(IMG_9409_10.png);
    }
    video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transform: scale(1.2);
      filter: contrast(1.3);
      background: black;
      transform-origin: 67%;
    }
    #touch-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: red;
      opacity: 0;
      pointer-events: none;
      z-index: 9999;
    }
  </style>
</head>
<body>
  <video id="vid" src="IMG_9410.mp4" playsinline muted></video>
  <div id="touch-overlay"></div>
  <script>
    const video = document.getElementById("vid");
    const overlay = document.getElementById("touch-overlay");

    video.addEventListener("loadedmetadata", () => {
      video.currentTime = 0;
      video.pause();
    });

    async function handleTouch() {
      video.pause();
      video.currentTime = 0;
      try {
        await video.play();
      } catch (err) {
        console.error("Playback failed:", err);
      }
    }

    video.addEventListener("ended", () => {
      video.pause();
      video.currentTime = 0;
    });

    window.addEventListener("touchstart", handleTouch, { passive: true });

    function showOverlay() { overlay.style.opacity = "1"; }
    function hideOverlay() { overlay.style.opacity = "0"; }

    // Half the frequency of the upper page: delay 67~133ms, hold 33~67ms
    function scheduleFakeTouch() {
      const delay = Math.random() * (133 - 67) + 67;
      setTimeout(() => {
        const holdDuration = Math.random() * (67 - 33) + 33;
        showOverlay();
        handleTouch();
        setTimeout(() => {
          hideOverlay();
          scheduleFakeTouch();
        }, holdDuration);
      }, delay);
    }
    scheduleFakeTouch();
  </script>
</body>
</html>
