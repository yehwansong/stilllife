<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Touch to Play</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: black;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-image: url(IMG_9409_10.png);
    }
    video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transform: scale(1.2);
      filter: contrast(1.3);
      background: black;
      transform-origin: 67%;
    }
  </style>
</head>
<body>
  <video id="vid" src="IMG_9409.mp4" playsinline muted autoplay></video>
  <script>
    const video = document.getElementById("vid");
    let fakeTimeout = null;
    let started = false;
    let restartCount = 0;
    let freePlayThreshold = Math.floor(Math.random() * 3) + 5;

    async function startPlayback() {
      video.currentTime = 0;
      try {
        await video.play();
        started = true;
      } catch (err) {
        video.muted = true;
        try {
          await video.play();
          started = true;
        } catch (err2) {
          console.error("Playback failed:", err2);
        }
      }
    }

    function scheduleNextRestart() {
      restartCount++;

      if (restartCount >= freePlayThreshold) {
        restartCount = 0;
        freePlayThreshold = Math.floor(Math.random() * 3) + 5;
        const freePlayDuration = Math.random() * 2000 + 5000;
        console.log(`🎬 Free play for ${Math.round(freePlayDuration / 1000)}s`);
        fakeTimeout = setTimeout(() => doRestart(), freePlayDuration);
        return;
      }

      const delay = Math.random() * 1200 + 1200;
      fakeTimeout = setTimeout(() => doRestart(), delay);
    }

    function doRestart() {
      video.currentTime = 0;
      video.play().catch(() => {});
      scheduleNextRestart();
    }

    video.addEventListener("ended", () => {
      video.pause();
      video.currentTime = 0;
    });

    video.addEventListener("loadedmetadata", () => {
      if (!started) {
        startPlayback().then(() => { if (started) scheduleNextRestart(); });
      }
    });

    startPlayback().then(() => { if (started) scheduleNextRestart(); });
  </script>
</body>
</html>
