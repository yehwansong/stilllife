<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Touch to Play</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: black;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-image: url(IMG_9409_10.png);
    }
    video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transform: scale(1.2);
      filter: contrast(1.3);
      background: black;
      transform-origin: 67%;
    }
  </style>
</head>
<body>
  <video id="vid" src="IMG_9409.mp4" playsinline muted autoplay></video>
  <script>
    const video = document.getElementById("vid");
    let fakeTimeout = null;
    let touchCount = 0;
    let pauseThreshold = Math.floor(Math.random() * 13) + 3;
    let started = false;

    async function startPlayback() {
      video.currentTime = 0;
      try {
        await video.play();
        console.log("▶️ Video playing");
        started = true;
      } catch (err) {
        console.warn("Autoplay blocked, retrying muted:", err);
        video.muted = true;
        try {
          await video.play();
          started = true;
          console.log("▶️ Playing muted after retry");
        } catch (err2) {
          console.error("Playback still failed:", err2);
        }
      }
    }

    async function handleTouch() {
      video.currentTime = 0;
      try {
        await video.play();
        console.log("▶️ Video restarted");
      } catch (err) {
        console.error("Playback failed:", err);
      }
    }

    function scheduleFakeTouch() {
      touchCount++;
      if (touchCount >= pauseThreshold) {
        touchCount = 0;
        pauseThreshold = Math.floor(Math.random() * 13) + 3;
        const pauseDuration = Math.random() * 1000 + 4000;
        console.log(`⏸️ Pausing for ${Math.round(pauseDuration)}ms, next threshold: ${pauseThreshold}`);
        fakeTimeout = setTimeout(() => {
          scheduleFakeTouch();
        }, pauseDuration);
        return;
      }
      const delay = Math.random() * 400 + 400;
      fakeTimeout = setTimeout(async () => {
        console.log(`👻 Fake touch #${touchCount} / ${pauseThreshold}`);
        await handleTouch();
        scheduleFakeTouch();
      }, delay);
    }

    video.addEventListener("ended", () => {
      video.pause();
      video.currentTime = 0;
      console.log("⏹️ Video ended, showing first frame");
    });

    // Try autoplay as soon as metadata is ready
    video.addEventListener("loadedmetadata", () => {
      if (!started) {
        startPlayback().then(() => {
          if (started) scheduleFakeTouch();
        });
      }
    });

    // Also try immediately in case metadata already loaded
    startPlayback().then(() => {
      if (started) scheduleFakeTouch();
    });

    // Touch overrides fake loop and restarts
    window.addEventListener("touchstart", () => {
      if (fakeTimeout) {
        clearTimeout(fakeTimeout);
        fakeTimeout = null;
      }
      touchCount = 0;
      pauseThreshold = Math.floor(Math.random() * 13) + 3;
      handleTouch();
      scheduleFakeTouch();
    }, { passive: true });

    // Click fallback for desktop/non-touch
    window.addEventListener("click", () => {
      if (fakeTimeout) {
        clearTimeout(fakeTimeout);
        fakeTimeout = null;
      }
      touchCount = 0;
      pauseThreshold = Math.floor(Math.random() * 13) + 3;
      handleTouch();
      scheduleFakeTouch();
    });
  </script>
</body>
</html>
